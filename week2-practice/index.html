<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KM ↔ Miles Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator">

        <!-- Title -->
        <h1 class="title">📏 Distance Converter</h1>

        <!-- Screen Display -->
        <div class="screen">
            <input type="text" id="entry" placeholder="0" readonly />
            <p id="result">Result will appear here</p>
        </div>

        <!-- Dropdown -->
        <div class="dropdown-container">
            <label for="combo">Select Conversion Type:</label>
            <select id="combo">
                <option value="km-to-miles">KM to Miles</option>
                <option value="miles-to-km">Miles to KM</option>
            </select>
        </div>

        <!-- Number Buttons -->
        <div class="buttons">
            <button class="btn-num" onclick="btnClick('7')">7</button>
            <button class="btn-num" onclick="btnClick('8')">8</button>
            <button class="btn-num" onclick="btnClick('9')">9</button>

            <button class="btn-num" onclick="btnClick('4')">4</button>
            <button class="btn-num" onclick="btnClick('5')">5</button>
            <button class="btn-num" onclick="btnClick('6')">6</button>

            <button class="btn-num" onclick="btnClick('1')">1</button>
            <button class="btn-num" onclick="btnClick('2')">2</button>
            <button class="btn-num" onclick="btnClick('3')">3</button>

            <button class="btn-num" onclick="btnClick('.')">.</button>
            <button class="btn-num" onclick="btnClick('0')">0</button>
            <button class="btn-num btn-back" onclick="btnClick('back')">⌫</button>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="btn-convert" onclick="convert()">Convert</button>
            <button class="btn-clear" onclick="clearAll()">Clear</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
